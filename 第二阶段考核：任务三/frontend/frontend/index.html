<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>克洛王国 - 回合制冒险</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <!-- 页面1：登录注册 -->
    <div id="page-login" class="page active">
        <div class="card">
            <h2>克洛王国</h2>
            <div class="tab-buttons">
                <button class="tab-btn active" data-tab="login">登录</button>
                <button class="tab-btn" data-tab="register">注册</button>
            </div>

            <!-- 登录表单 -->
            <div id="login-form" class="form-container active">
                <input type="text" id="login-account" placeholder="用户名/邮箱/手机号" autocomplete="off">
                <input type="password" id="login-password" placeholder="密码">
                <button id="login-btn">登录</button>
            </div>

            <!-- 注册表单 -->
            <div id="register-form" class="form-container">
                <input type="text" id="reg-username" placeholder="用户名" autocomplete="off">
                <input type="email" id="reg-email" placeholder="邮箱">
                <input type="text" id="reg-phone" placeholder="手机号">
                <input type="password" id="reg-password" placeholder="密码">
                <input type="password" id="reg-confirm" placeholder="确认密码">
                <button id="register-btn">注册</button>
            </div>

            <div id="login-message" class="message"></div>
        </div>
    </div>

    <!-- 页面2：创建精灵 -->
    <div id="page-create-pet" class="page">
        <div class="card">
            <h2>选择你的初始精灵</h2>
            <div class="pet-options">
                <div class="pet-option" data-type="WATER">
                    <div class="pet-name">水蓝蓝</div>
                    <div class="pet-type">水系</div>
                    <div class="pet-desc">生命125 攻击100 防御100 速度100</div>
                </div>
                <div class="pet-option" data-type="FIRE">
                    <div class="pet-name">火花</div>
                    <div class="pet-type">火系</div>
                    <div class="pet-desc">生命100 攻击150 防御80 速度120</div>
                </div>
                <div class="pet-option" data-type="GRASS">
                    <div class="pet-name">喵喵</div>
                    <div class="pet-type">草系</div>
                    <div class="pet-desc">生命150 攻击80 防御120 速度80</div>
                </div>
            </div>
            <button id="create-pet-btn" disabled>创建精灵</button>
            <div id="create-message" class="message"></div>
        </div>
    </div>

    <!-- 页面3：主游戏界面（关卡选择+战斗） -->
    <div id="page-game" class="page">
        <div class="game-header">
            <div class="pet-info" id="pet-info">精灵信息加载中...</div>
            <button id="logout-btn">退出登录</button>
        </div>

        <div class="game-main">
            <!-- 左侧：关卡列表 -->
            <div class="level-panel">
                <h3>关卡列表</h3>
                <div id="level-list" class="level-list"></div>
            </div>

            <!-- 右侧：战斗面板 -->
            <div class="battle-panel">
                <div class="battle-status" id="battle-status">
                    <div class="battle-pet">
                        <div id="battle-pet-name"></div>
                        <div id="battle-pet-hp"></div>
                    </div>
                    <div class="battle-vs">VS</div>
                    <div class="battle-monster">
                        <div id="battle-monster-name"></div>
                        <div id="battle-monster-hp"></div>
                    </div>
                </div>

                <div class="battle-logs" id="battle-logs">
                    <div>点击关卡开始战斗</div>
                </div>

                <div class="battle-actions" id="battle-actions" style="display:none;">
                    <button id="skill1-btn">技能1</button>
                    <button id="skill2-btn">技能2</button>
                    <button id="skill3-btn">技能3</button>
                    <button id="surrender-btn">投降</button>
                </div>

                <button id="start-battle-btn" style="display:none;">开始战斗</button>
                <button id="claim-reward-btn" style="display:none;">领取奖励</button>
            </div>
        </div>

        <!-- AI策略推荐 -->
        <div class="ai-panel">
            <button id="strategy-btn">获取策略推荐</button>
            <div id="strategy-text" class="ai-text"></div>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
